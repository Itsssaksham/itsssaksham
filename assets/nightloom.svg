<svg width="436" height="190" viewBox="0 0 436 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nightloom Archive — a store that boots like a video game">
  <defs>
    <linearGradient id="shimmer" x1="-1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#d4a94e"/>
      <stop offset=".5" stop-color="#ffe9b8"/>
      <stop offset="1" stop-color="#d4a94e"/>
      <animate attributeName="x1" values="-1;1" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="3.4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="nglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="434" height="188" rx="12" fill="#130b1a" stroke="#d4a94e" stroke-opacity=".35"/>
  <rect x="10" y="10" width="416" height="170" rx="7" fill="none" stroke="#d4a94e" stroke-opacity=".14"/>
  <!-- corner ornaments -->
  <g stroke="#d4a94e" stroke-opacity=".5" fill="none">
    <path d="M18 30 v-12 h12"/><path d="M418 30 v-12 h-12"/>
    <path d="M18 160 v12 h12"/><path d="M418 160 v12 h-12"/>
  </g>

  <text x="218" y="40" text-anchor="middle" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="9" letter-spacing="4" fill="#a98cc9" fill-opacity=".7">DARK-FANTASY RPG E-COMMERCE</text>

  <text x="218" y="86" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="30" letter-spacing="3" fill="url(#shimmer)" filter="url(#nglow)">Nightloom Archive</text>

  <!-- rarity pips -->
  <g text-anchor="middle" font-size="12" fill="#9d6bd4">
    <text x="188" y="112"><animate attributeName="opacity" values=".25;1;.25" dur="2.4s" repeatCount="indefinite"/>◆</text>
    <text x="218" y="112"><animate attributeName="opacity" values=".25;1;.25" dur="2.4s" begin=".4s" repeatCount="indefinite"/>◆</text>
    <text x="248" y="112"><animate attributeName="opacity" values=".25;1;.25" dur="2.4s" begin=".8s" repeatCount="indefinite"/>◆</text>
  </g>

  <text x="218" y="136" text-anchor="middle" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="11" fill="#b9a3d0">garments as relics — rarity · lore · durability</text>

  <text x="218" y="166" text-anchor="middle" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="10" letter-spacing="3" fill="#d4a94e">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;.5;.55;.95;1" dur="1.9s" repeatCount="indefinite"/>PRESS ▶ TO START</text>
</svg>
