<svg width="436" height="190" viewBox="0 0 436 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VESPER/OS — a 1989 observatory workstation in your browser">
  <defs>
    <filter id="vglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="434" height="188" rx="12" fill="#0a0f1e" stroke="#f0a63c" stroke-opacity=".35"/>

  <!-- stars -->
  <g fill="#cfe0ff">
    <circle cx="330" cy="30" r="1"><animate attributeName="opacity" values=".2;.9;.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="392" cy="58" r=".8"><animate attributeName="opacity" values=".8;.15;.8" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="356" cy="96" r="1.1"><animate attributeName="opacity" values=".3;1;.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="404" cy="130" r=".8"><animate attributeName="opacity" values=".9;.25;.9" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- mini window frames -->
  <g stroke="#f0a63c" fill="none">
    <g stroke-opacity=".55">
      <rect x="300" y="112" width="86" height="54" rx="3"/>
      <line x1="300" y1="126" x2="386" y2="126"/>
      <circle cx="308" cy="119" r="2" fill="#f0a63c" stroke="none" fill-opacity=".8"/>
    </g>
    <g stroke-opacity=".3">
      <rect x="322" y="128" width="86" height="50" rx="3" fill="#0a0f1e"/>
      <line x1="322" y1="141" x2="408" y2="141"/>
    </g>
    <!-- oscilloscope trace in back window -->
    <path d="M306 150 q6 -12 12 0 t12 0 t12 0 t12 0 t12 0 t12 0" stroke="#f0a63c" stroke-opacity=".85" stroke-width="1.2">
      <animate attributeName="d"
        values="M306 150 q6 -12 12 0 t12 0 t12 0 t12 0 t12 0 t12 0;
                M306 150 q6 12 12 0 t12 0 t12 0 t12 0 t12 0 t12 0;
                M306 150 q6 -12 12 0 t12 0 t12 0 t12 0 t12 0 t12 0" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ADAPT lamp -->
  <g font-family="ui-monospace,Consolas,Menlo,monospace">
    <circle cx="306" cy="34" r="3.5" fill="#e04b3a"><animate attributeName="opacity" values=".25;1;.25" dur="2.8s" repeatCount="indefinite"/></circle>
    <text x="316" y="38" font-size="9" letter-spacing="2" fill="#e04b3a" fill-opacity=".8">ADAPT</text>
  </g>

  <text x="26" y="34" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="9" letter-spacing="3" fill="#f0a63c" fill-opacity=".6">EST. 1989 — MERIDIAN INSTRUMENTS</text>
  <text x="24" y="76" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="30" font-weight="bold" letter-spacing="2" fill="#f0a63c" filter="url(#vglow)">VESPER/OS ▲</text>
  <text x="26" y="100" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="11" fill="#b8a06d">a 1989 observatory workstation, booting in your browser</text>

  <g font-family="ui-monospace,Consolas,Menlo,monospace" font-size="10" fill="#5f7194">
    <text x="26" y="132">&gt; 8 apps · window manager · vsh · planetarium</text>
    <text x="26" y="152">&gt; the real sky over Ladakh, right now</text>
    <rect x="26" y="160" width="8" height="12" fill="#f0a63c"><animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/></rect>
  </g>
</svg>
